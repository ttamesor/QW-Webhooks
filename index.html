<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(140deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1300px;
  padding: 60px 20px;
}

h1 {
  font-weight: 400;
  text-align: center;
  margin-bottom: 40px;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 50px;
}

.tab-btn {
  padding: 10px 26px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  transition: 0.2s ease;
}

.tab-btn:hover { background: rgba(255,255,255,0.15); }

.tab-btn.active {
  background: #ffffff;
  color: #203a43;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  padding: 28px 38px;
  border-radius: 18px;
  min-width: 240px;
  transition: 0.25s ease;
}

.stat-card.clickable { cursor: pointer; }

.stat-card.clickable:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
}

.stat-title { font-size: 0.85rem; opacity: 0.7; margin-bottom: 8px; }

.stat-number { font-size: 2rem; font-weight: 600; }

.stat-sub { margin-top: 6px; font-size: 0.85rem; opacity: 0.7; }

.heat-up { color: #4caf50; }
.heat-down { color: #ff5252; }

.leaderboard {
  margin-top: 30px;
  text-align: left;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.leaderboard h3 {
  font-weight: 400;
  margin-bottom: 10px;
}

.leader-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.activity-feed {
  margin-top: 40px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
}

.activity-item {
  padding: 6px 0;
  font-size: 0.9rem;
  opacity: 0.8;
}

#drillView { display: none; margin-top: 30px; }

.sort-select {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  margin-bottom: 20px;
  font-family: Roboto;
}

.doc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.08);
  padding: 18px 24px;
  border-radius: 12px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.doc-row:hover {
  background: rgba(255,255,255,0.18);
}

.back-btn {
  margin-bottom: 20px;
  padding: 6px 16px;
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>
<div class="wrapper">

<h1>🚀 QuoteValet Live Dashboard</h1>

<div class="tab-container">
  <div class="tab-btn active" onclick="switchTab(event,'Accepted')">💰 Accepted</div>
  <div class="tab-btn" onclick="switchTab(event,'Views')">👀 Views</div>
</div>

<div id="mainView">
  <div class="stats-container" id="statsContainer"></div>
  <div id="leaderboard" class="leaderboard"></div>
  <div id="activityFeed" class="activity-feed"></div>
</div>

<div id="drillView">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <select id="sortSelect" class="sort-select" onchange="renderDrill()"></select>
  <div id="drillContent"></div>
</div>

</div>

<script>

let allData = [];
let currentTab = "Accepted";
let currentDataset = [];

function handleData(data) {
  allData = data || [];
  renderDashboard();
}

function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");
  goBack();
  renderDashboard();
}

function renderDashboard() {

  document.getElementById("statsContainer").innerHTML = "";
  document.getElementById("leaderboard").innerHTML = "";
  document.getElementById("activityFeed").innerHTML = "";

  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const lastMonthDate = new Date(thisYear, thisMonth - 1, 1);
  const lastMonth = lastMonthDate.getMonth();
  const lastMonthYear = lastMonthDate.getFullYear();

  const eventFilter = currentTab === "Accepted"
    ? "QuoteValet.Accepted"
    : "QuoteValet.ViewedExternal";

  const filtered = allData.filter(r => r.EventFullName === eventFilter);

  const thisMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });

  const lastMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === lastMonth && d.getFullYear() === lastMonthYear;
  });

  const thisMonthValue = thisMonthData.reduce((s,r)=>s+parseFloat(r.GrandTotal||0),0);
  const lastMonthValue = lastMonthData.reduce((s,r)=>s+parseFloat(r.GrandTotal||0),0);

  const diff = thisMonthValue - lastMonthValue;
  const heatClass = diff >= 0 ? "heat-up" : "heat-down";
  const heatSymbol = diff >= 0 ? "▲" : "▼";

  createCard("📅 This Month", thisMonthData.length, thisMonthValue,
    `<span class="${heatClass}">${heatSymbol} £${Math.abs(diff).toFixed(2)} vs last month</span>`
  );

  createTopPerformers(thisMonthData);
  createActivityFeed(filtered);
}

function createCard(title, count, value, heat) {
  const card = document.createElement("div");
  card.className = "stat-card clickable";

  card.innerHTML = `
    <div class="stat-title">${title}</div>
    <div class="stat-number">${count} deals</div>
    <div class="stat-sub">£${value.toFixed(2)}</div>
    <div class="stat-sub">${heat || ""}</div>
  `;

  document.getElementById("statsContainer").appendChild(card);
}

function createTopPerformers(data) {
  if(currentTab !== "Accepted") return;

  const grouped = {};
  data.forEach(r=>{
    const rep = r.SalesRep || "Unknown";
    if(!grouped[rep]) grouped[rep]=0;
    grouped[rep]+=parseFloat(r.GrandTotal||0);
  });

  const sorted = Object.entries(grouped)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3);

  let html = "<h3>🏆 Top Performers This Month</h3>";
  sorted.forEach((r,i)=>{
    html+=`<div class="leader-row"><span>${i+1}. ${r[0]}</span><span>£${r[1].toFixed(2)}</span></div>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

function createActivityFeed(data){
  const latest = [...data]
    .sort((a,b)=>new Date(b.EventDateTime)-new Date(a.EventDateTime))
    .slice(0,5);

  let html = "<h3>📡 Live Activity</h3>";
  latest.forEach(r=>{
    const emoji = r.EventFullName.includes("Accepted") ? "💰" : "👀";
    html+=`<div class="activity-item">${emoji} ${r.DocNo} – ${new Date(r.EventDateTime).toLocaleTimeString()}</div>`;
  });

  document.getElementById("activityFeed").innerHTML = html;
}

function goBack(){
  document.getElementById("drillView").style.display="none";
  document.getElementById("mainView").style.display="block";
}

setInterval(()=>{
  const script=document.createElement("script");
  script.src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData&ts="+new Date().getTime();
  document.body.appendChild(script);
},60000);

</script>

<script src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData"></script>

</body>
</html>
