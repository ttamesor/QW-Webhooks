<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuoteValet Dashboard</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap)" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0f1a;
  --bg-secondary: #111827;
  --bg-card: rgba(17, 24, 39, 0.8);
  --bg-card-hover: rgba(31, 41, 55, 0.9);
  --border: rgba(255, 255, 255, 0.08);
  --text-primary: #f9fafb;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --accent-blue: #3b82f6;
  --accent-green: #10b981;
  --accent-amber: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #8b5cf6;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

.wrapper {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}

.header h1 {
  font-size: 1.75rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 16px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: rgba(16, 185, 129, 0.15);
  border: 1px solid rgba(16, 185, 129, 0.3);
  border-radius: 20px;
  font-size: 0.8rem;
  color: var(--accent-green);
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--accent-green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

#lastUpdated {
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  position: relative;
  overflow: hidden;
  transition: all 0.2s ease;
}

.stat-card:hover {
  background: var(--bg-card-hover);
  transform: translateY(-2px);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}

.stat-card.pipeline::before { background: var(--accent-blue); }
.stat-card.accepted::before { background: var(--accent-green); }
.stat-card.views::before { background: var(--accent-purple); }
.stat-card.pending::before { background: var(--accent-amber); }

.stat-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 1.75rem;
  font-weight: 600;
}

.stat-change {
  font-size: 0.8rem;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.stat-change.up { color: var(--accent-green); }
.stat-change.down { color: var(--accent-red); }

/* Tabs */
.tab-container {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  background: var(--bg-secondary);
  padding: 6px;
  border-radius: 10px;
  width: fit-content;
}

.tab-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tab-btn:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.05);
}

.tab-btn.active {
  background: var(--accent-blue);
  color: white;
}

.tab-count {
  background: rgba(255, 255, 255, 0.2);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.75rem;
}

/* Main Content Grid */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 24px;
}

@media (max-width: 1024px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
}

/* Panels */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-title {
  font-size: 0.95rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-body {
  padding: 0;
  max-height: 400px;
  overflow-y: auto;
}

.panel-body::-webkit-scrollbar {
  width: 6px;
}

.panel-body::-webkit-scrollbar-track {
  background: transparent;
}

.panel-body::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
}

/* Quote List Items */
.quote-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s ease;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
}

.quote-item:last-child {
  border-bottom: none;
}

.quote-item:hover {
  background: rgba(255, 255, 255, 0.03);
}

.quote-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.quote-doc {
  font-weight: 500;
  font-size: 0.9rem;
}

.quote-customer {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.quote-meta {
  display: flex;
  gap: 8px;
  align-items: center;
}

.quote-amount {
  font-weight: 600;
  font-size: 0.95rem;
}

.quote-badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
}

.badge-views {
  background: rgba(139, 92, 246, 0.2);
  color: var(--accent-purple);
}

.badge-hot {
  background: rgba(245, 158, 11, 0.2);
  color: var(--accent-amber);
}

.badge-stale {
  background: rgba(107, 114, 128, 0.2);
  color: var(--text-muted);
}

.badge-accepted {
  background: rgba(16, 185, 129, 0.2);
  color: var(--accent-green);
}

/* Activity Feed */
.activity-item {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.activity-item:last-child {
  border-bottom: none;
}

.activity-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.9rem;
}

.activity-icon.view { background: rgba(139, 92, 246, 0.2); }
.activity-icon.accept { background: rgba(16, 185, 129, 0.2); }
.activity-icon.create { background: rgba(59, 130, 246, 0.2); }

.activity-content {
  flex: 1;
  min-width: 0;
}

.activity-text {
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.activity-text strong {
  color: var(--text-primary);
  font-weight: 500;
}

.activity-time {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Rep Leaderboard */
.rep-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: center;
}

.rep-item:last-child {
  border-bottom: none;
}

.rep-rank {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: var(--bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 600;
}

.rep-rank.gold { background: rgba(245, 158, 11, 0.2); color: var(--accent-amber); }
.rep-rank.silver { background: rgba(156, 163, 175, 0.2); color: var(--text-secondary); }
.rep-rank.bronze { background: rgba(180, 83, 9, 0.2); color: #d97706; }

.rep-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.rep-name {
  font-weight: 500;
  font-size: 0.9rem;
}

.rep-bar {
  height: 4px;
  background: var(--bg-secondary);
  border-radius: 2px;
  overflow: hidden;
}

.rep-bar-fill {
  height: 100%;
  background: var(--accent-green);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.rep-amount {
  font-weight: 600;
  font-size: 0.9rem;
  text-align: right;
}

/* Search */
.search-box {
  position: relative;
  margin-bottom: 16px;
}

.search-box input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-box input::placeholder {
  color: var(--text-muted);
}

.search-box input:focus {
  border-color: var(--accent-blue);
}

.search-box::before {
  content: '🔍';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem;
  opacity: 0.5;
}

/* Empty State */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
}

.empty-state-icon {
  font-size: 2rem;
  margin-bottom: 12px;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.2s ease;
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow: hidden;
  transform: scale(0.95);
  transition: transform 0.2s ease;
}

.modal-overlay.active .modal {
  transform: scale(1);
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title {
  font-size: 1.1rem;
  font-weight: 600;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.25rem;
  padding: 4px;
  line-height: 1;
}

.modal-close:hover {
  color: var(--text-primary);
}

.modal-body {
  padding: 24px;
  overflow-y: auto;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.detail-row:last-child {
  border-bottom: none;
}

.detail-label {
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.detail-value {
  font-weight: 500;
  text-align: right;
}

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 768px) {
  .wrapper {
    padding: 20px 16px;
  }
  
  .header h1 {
    font-size: 1.35rem;
  }
  
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .tab-container {
    width: 100%;
    overflow-x: auto;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <h1>📊 QuoteValet</h1>
    <div class="header-meta">
      <div class="status-badge">
        <span class="status-dot"></span>
        Live
      </div>
      <div id="lastUpdated">Connecting...</div>
    </div>
  </div>

  <div id="statsGrid" class="stats-grid"></div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search quotes by doc number, customer, or rep..." oninput="handleSearch(this.value)">
  </div>

  <div class="tab-container">
    <button class="tab-btn active" data-tab="all" onclick="switchTab(event, 'all')">
      All <span class="tab-count" id="countAll">0</span>
    </button>
    <button class="tab-btn" data-tab="hot" onclick="switchTab(event, 'hot')">
      🔥 Hot <span class="tab-count" id="countHot">0</span>
    </button>
    <button class="tab-btn" data-tab="accepted" onclick="switchTab(event, 'accepted')">
      ✅ Accepted <span class="tab-count" id="countAccepted">0</span>
    </button>
    <button class="tab-btn" data-tab="stale" onclick="switchTab(event, 'stale')">
      🧊 Stale <span class="tab-count" id="countStale">0</span>
    </button>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📋 Quotes</span>
        <span id="quoteCount" style="color: var(--text-muted); font-size: 0.85rem;"></span>
      </div>
      <div class="panel-body" id="quotesList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 24px;">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">🏆 Leaderboard</span>
        </div>
        <div class="panel-body" id="leaderboard"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">⚡ Recent Activity</span>
        </div>
        <div class="panel-body" id="activityFeed"></div>
      </div>
    </div>
  </div>

</div>

<!-- Quote Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Quote Details</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const APPS_SCRIPT_BASE = "YOUR_URL_HERE";

let allData = [];
let quotes = {};
let currentTab = "all";
let searchQuery = "";

// Utility functions
function currency(v) {
  return parseFloat(v || 0).toLocaleString("en-GB", { style: "currency", currency: "GBP" });
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  const date = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);
  
  if (diff < 60) return "Just now";
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
  return date.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

function loadData() {
  const script = document.createElement("script");
  script.src = APPS_SCRIPT_BASE + "?callback=handleData&ts=" + Date.now();
  script.onerror = () => {
    document.getElementById("lastUpdated").innerText = "Connection error";
  };
  document.body.appendChild(script);
}

function handleData(data) {
  document.getElementById("lastUpdated").innerText =
    "Updated " + new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });

  allData = data || [];
  groupQuotes();
  renderDashboard();
}

function groupQuotes() {
  quotes = {};
  
  allData.forEach(r => {
    const doc = r.DocNo;
    if (!quotes[doc]) {
      quotes[doc] = {
        doc: r,
        views: 0,
        accepted: false,
        created: false,
        events: [],
        lastActivity: null
      };
    }

    const event = {
      type: r.EventFullName,
      timestamp: r.Timestamp || r.Created
    };
    quotes[doc].events.push(event);

    if (r.EventFullName === "QuoteValet.CreatedForCustomer") {
      quotes[doc].created = true;
    }
    if (r.EventFullName === "QuoteValet.ViewedExternal") {
      quotes[doc].views++;
    }
    if (r.EventFullName === "QuoteValet.Accepted") {
      quotes[doc].accepted = true;
    }

    // Track most recent activity
    const eventTime = new Date(event.timestamp);
    if (!quotes[doc].lastActivity || eventTime > new Date(quotes[doc].lastActivity)) {
      quotes[doc].lastActivity = event.timestamp;
    }
  });
}

function getFilteredQuotes() {
  let list = Object.values(quotes);
  
  // Apply search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(quote => {
      const doc = (quote.doc.DocNo || "").toLowerCase();
      const customer = (quote.doc.CustomerName || quote.doc.Customer || "").toLowerCase();
      const rep = (quote.doc.SalesRep || "").toLowerCase();
      return doc.includes(q) || customer.includes(q) || rep.includes(q);
    });
  }
  
  // Apply tab filter
  switch (currentTab) {
    case "hot":
      list = list.filter(q => !q.accepted && q.views >= 2);
      break;
    case "accepted":
      list = list.filter(q => q.accepted);
      break;
    case "stale":
      list = list.filter(q => q.created && !q.accepted && q.views === 0);
      break;
  }
  
  // Sort by value descending
  list.sort((a, b) => parseFloat(b.doc.SubTotal || 0) - parseFloat(a.doc.SubTotal || 0));
  
  return list;
}

function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  e.target.closest(".tab-btn").classList.add("active");
  renderQuotesList();
}

function handleSearch(value) {
  searchQuery = value;
  renderQuotesList();
}

function renderDashboard() {
  renderStats();
  renderQuotesList();
  renderLeaderboard();
  renderActivity();
  updateTabCounts();
}

function renderStats() {
  const container = document.getElementById("statsGrid");
  const list = Object.values(quotes);

  const pipelineQuotes = list.filter(q => q.created && !q.accepted);
  const pipeline = pipelineQuotes.reduce((sum, q) => sum + parseFloat(q.doc.SubTotal || 0), 0);

  const acceptedQuotes = list.filter(q => q.accepted);
  const accepted = acceptedQuotes.reduce((sum, q) => sum + parseFloat(q.doc.SubTotal || 0), 0);

  const totalViews = list.reduce((sum, q) => sum + q.views, 0);
  const hotQuotes = list.filter(q => !q.accepted && q.views >= 2).length;

  container.innerHTML = `
    <div class="stat-card pipeline">
      <div class="stat-label">Pipeline Value</div>
      <div class="stat-value">${currency(pipeline)}</div>
      <div class="stat-change">${pipelineQuotes.length} active quotes</div>
    </div>
    <div class="stat-card accepted">
      <div class="stat-label">Won Value</div>
      <div class="stat-value">${currency(accepted)}</div>
      <div class="stat-change up">↑ ${acceptedQuotes.length} accepted</div>
    </div>
    <div class="stat-card views">
      <div class="stat-label">Total Views</div>
      <div class="stat-value">${totalViews}</div>
      <div class="stat-change">${list.length} quotes tracked</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-label">Hot Prospects</div>
      <div class="stat-value">${hotQuotes}</div>
      <div class="stat-change">2+ views, not accepted</div>
    </div>
  `;
}

function updateTabCounts() {
  const list = Object.values(quotes);
  document.getElementById("countAll").textContent = list.length;
  document.getElementById("countHot").textContent = list.filter(q => !q.accepted && q.views >= 2).length;
  document.getElementById("countAccepted").textContent = list.filter(q => q.accepted).length;
  document.getElementById("countStale").textContent = list.filter(q => q.created && !q.accepted && q.views === 0).length;
}

function renderQuotesList() {
  const container = document.getElementById("quotesList");
  const filtered = getFilteredQuotes();
  
  document.getElementById("quoteCount").textContent = `${filtered.length} quotes`;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div>No quotes found</div>
      </div>
    `;
    return;
  }

  container.innerHTML = filtered.map(q => {
    const amount = parseFloat(q.doc.SubTotal || 0);
    const customer = q.doc.CustomerName || q.doc.Customer || "Unknown Customer";
    
    let badge = "";
    if (q.accepted) {
      badge = `<span class="quote-badge badge-accepted">Accepted</span>`;
    } else if (q.views >= 2) {
      badge = `<span class="quote-badge badge-hot">🔥 ${q.views} views</span>`;
    } else if (q.views > 0) {
      badge = `<span class="quote-badge badge-views">${q.views} view${q.views > 1 ? 's' : ''}</span>`;
    } else if (q.created) {
      badge = `<span class="quote-badge badge-stale">Not viewed</span>`;
    }

    return `
      <div class="quote-item" onclick="showQuoteDetail('${q.doc.DocNo}')">
        <div class="quote-info">
          <div class="quote-doc">${q.doc.DocNo}</div>
          <div class="quote-customer">${customer}</div>
        </div>
        <div class="quote-meta">
          ${badge}
          <div class="quote-amount">${currency(amount)}</div>
        </div>
      </div>
    `;
  }).join("");
}

function renderLeaderboard() {
  const container = document.getElementById("leaderboard");
  const list = Object.values(quotes);
  
  const reps = {};
  list.forEach(q => {
    const rep = q.doc.SalesRep || "Unknown";
    if (!reps[rep]) reps[rep] = { total: 0, accepted: 0, count: 0 };
    reps[rep].count++;
    if (q.accepted) {
      reps[rep].accepted += parseFloat(q.doc.SubTotal || 0);
    }
    reps[rep].total += parseFloat(q.doc.SubTotal || 0);
  });

  const sorted = Object.entries(reps)
    .sort((a, b) => b[1].accepted - a[1].accepted)
    .slice(0, 5);

  const maxValue = sorted.length > 0 ? sorted[0][1].accepted : 1;

  if (sorted.length === 0) {
    container.innerHTML = `<div class="empty-state"><div>No data yet</div></div>`;
    return;
  }

  container.innerHTML = sorted.map(([rep, data], i) => {
    const percent = maxValue > 0 ? (data.accepted / maxValue) * 100 : 0;
    const rankClass = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    
    return `
      <div class="rep-item">
        <div class="rep-rank ${rankClass}">${i + 1}</div>
        <div class="rep-info">
          <div class="rep-name">${rep}</div>
          <div class="rep-bar">
            <div class="rep-bar-fill" style="width: ${percent}%"></div>
          </div>
        </div>
        <div class="rep-amount">${currency(data.accepted)}</div>
      </div>
    `;
  }).join("");
}

function renderActivity() {
  const container = document.getElementById("activityFeed");
  
  // Flatten events with quote info
  const events = [];
  Object.values(quotes).forEach(q => {
    q.events.forEach(e => {
      events.push({
        ...e,
        docNo: q.doc.DocNo,
        customer: q.doc.CustomerName || q.doc.Customer || "Unknown"
      });
    });
  });

  // Sort by time, most recent first
  events.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  const recent = events.slice(0, 8);

  if (recent.length === 0) {
    container.innerHTML = `<div class="empty-state"><div>No recent activity</div></div>`;
    return;
  }

  container.innerHTML = recent.map(e => {
    let icon = "📄";
    let iconClass = "create";
    let action = "created";

    if (e.type === "QuoteValet.ViewedExternal") {
      icon = "👀";
      iconClass = "view";
      action = "viewed";
    } else if (e.type === "QuoteValet.Accepted") {
      icon = "✅";
      iconClass = "accept";
      action = "accepted";
    }

    return `
      <div class="activity-item">
        <div class="activity-icon ${iconClass}">${icon}</div>
        <div class="activity-content">
          <div class="activity-text"><strong>${e.docNo}</strong> was ${action}</div>
          <div class="activity-time">${timeAgo(e.timestamp)}</div>
        </div>
      </div>
    `;
  }).join("");
}

function showQuoteDetail(docNo) {
  const quote = quotes[docNo];
  if (!quote) return;

  const doc = quote.doc;
  const customer = doc.CustomerName || doc.Customer || "Unknown";

  document.getElementById("modalTitle").textContent = `Quote ${docNo}`;
  document.getElementById("modalBody").innerHTML = `
    <div class="detail-row">
      <span class="detail-label">Customer</span>
      <span class="detail-value">${customer}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Sales Rep</span>
      <span class="detail-value">${doc.SalesRep || "—"}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Value</span>
      <span class="detail-value">${currency(doc.SubTotal)}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Views</span>
      <span class="detail-value">${quote.views}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="detail-value">${quote.accepted ? "✅ Accepted" : quote.views > 0 ? "👀 Viewed" : "📭 Not viewed"}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Last Activity</span>
      <span class="detail-value">${timeAgo(quote.lastActivity)}</span>
    </div>
  `;

  document.getElementById("modalOverlay").classList.add("active");
}

function closeModal(e) {
  if (!e || e.target === document.getElementById("modalOverlay")) {
    document.getElementById("modalOverlay").classList.remove("active");
  }
}

// Keyboard shortcut to close modal
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

// Initialize
setInterval(loadData, 60000);
loadData();
</script>
