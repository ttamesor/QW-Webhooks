<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Accepted Dashboard</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #0f2027, #0b1114 70%);
  color:#00ff99;
  font-family:'Segoe UI', Arial, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container {
  width:90%;
  max-width:1300px;
  text-align:center;
}

.header {
  font-size:24px;
  margin-bottom:30px;
}

.grid {
  display:flex;
  justify-content:space-around;
  margin-bottom:40px;
  font-size:20px;
}

.card {
  padding:20px;
}

.big {
  font-size:36px;
  font-weight:700;
  color:#00ffcc;
}

.leaderboard {
  font-size:20px;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    QuoteValet Accepted Performance
  </div>

  <div class="grid">
    <div class="card" id="today"></div>
    <div class="card" id="month"></div>
    <div class="card" id="lastMonth"></div>
  </div>

  <div class="leaderboard" id="topReps"></div>

</div>

<script>

const endpoint = "https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec";

function sum(arr, field) {
  return arr.reduce((s,r)=>s+(parseFloat(r[field])||0),0);
}

function loadData() {
  fetch(endpoint)
    .then(res => res.json())
    .then(rows => {

      // STRICT match
      const accepted = rows.filter(r =>
        r.EventFullName === "QuoteValet.Accepted"
      );

      const now = new Date();

      const today = accepted.filter(r => {
        const d = new Date(r.EventDateTime);
        return d.toDateString() === now.toDateString();
      });

      const thisMonth = accepted.filter(r => {
        const d = new Date(r.EventDateTime);
        return d.getMonth() === now.getMonth() &&
               d.getFullYear() === now.getFullYear();
      });

      const lastMonth = accepted.filter(r => {
        const d = new Date(r.EventDateTime);

        let lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);

        return d.getMonth() === lastMonthDate.getMonth() &&
               d.getFullYear() === lastMonthDate.getFullYear();
      });

      // TODAY
      document.getElementById("today").innerHTML =
        "Today<br><div class='big'>£" +
        sum(today,"SubTotal").toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</div>" +
        today.length + " accepted";

      // THIS MONTH
      document.getElementById("month").innerHTML =
        "This Month<br><div class='big'>£" +
        sum(thisMonth,"SubTotal").toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</div>" +
        thisMonth.length + " accepted";

      // LAST MONTH
      document.getElementById("lastMonth").innerHTML =
        "Last Month<br><div class='big'>£" +
        sum(lastMonth,"SubTotal").toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</div>" +
        lastMonth.length + " accepted";

      buildTop3(thisMonth);
    });
}

function buildTop3(data) {

  const reps = {};

  data.forEach(r => {
    const rep = r.SalesRep || "Unknown";
    reps[rep] = (reps[rep] || 0) + (parseFloat(r.SubTotal)||0);
  });

  const sorted = Object.entries(reps)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3);

  let html = "<strong>Top 3 Sales Reps This Month</strong><br><br>";

  sorted.forEach(([rep,total],i)=>{
    html += (i+1) + ". " + rep +
      " — £" +
      total.toLocaleString("en-GB",{minimumFractionDigits:2}) +
      "<br>";
  });

  document.getElementById("topReps").innerHTML = html;
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
