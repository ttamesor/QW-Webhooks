<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(140deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1200px;
  padding: 60px 20px;
  text-align: center;
}

h1 {
  font-weight: 400;
  margin-bottom: 40px;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 50px;
}

.tab-btn {
  padding: 10px 26px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  transition: 0.2s ease;
}

.tab-btn:hover {
  background: rgba(255,255,255,0.15);
}

.tab-btn.active {
  background: #ffffff;
  color: #203a43;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 50px;
}

.stat-card {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  padding: 32px 44px;
  border-radius: 18px;
  min-width: 240px;
  transition: 0.25s ease;
}

.stat-card.clickable {
  cursor: pointer;
}

.stat-card.clickable:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
}

.stat-title {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-bottom: 12px;
}

.stat-number {
  font-size: 2.4rem;
  font-weight: 500;
}

.stat-sub {
  margin-top: 8px;
  font-size: 0.9rem;
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>QuoteValet Dashboard</h1>

<div class="tab-container">
  <div class="tab-btn active" onclick="switchTab(event,'Accepted')">Accepted</div>
  <div class="tab-btn" onclick="switchTab(event,'Views')">Views</div>
</div>

<div class="stats-container" id="statsContainer"></div>

</div>

<script>

const DATA_URL = "https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData";

let allData = [];
let currentTab = "Accepted";

function handleData(data) {
  allData = data || [];
  renderDashboard();
}

function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");
  renderDashboard();
}

function renderDashboard() {

  const container = document.getElementById("statsContainer");
  container.innerHTML = "";

  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();
  const today = now.toDateString();

  const eventFilter = currentTab === "Accepted"
    ? "QuoteValet.Accepted"
    : "QuoteValet.ViewedExternal";

  const filtered = allData.filter(r => r.EventFullName === eventFilter);

  const todayData = filtered.filter(r =>
    new Date(r.EventDateTime).toDateString() === today
  );

  const thisMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });

  createCard("Today", todayData.length);
  createCard("This Month", thisMonthData.length);
}

function createCard(title, count) {

  const card = document.createElement("div");
  card.className = "stat-card";

  card.innerHTML = `
    <div class="stat-title">${title}</div>
    <div class="stat-number">${count}</div>
    <div class="stat-sub">${count === 0 ? "No results" : (count === 1 ? "Result" : "Results")}</div>
  `;

  document.getElementById("statsContainer").appendChild(card);
}

</script>

<script src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData"></script>

</body>
</html>
