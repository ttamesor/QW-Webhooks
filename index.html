<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QW Webhooks Dashboard</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1200px;
  text-align: center;
  padding: 40px 20px;
}

h1 {
  margin-bottom: 30px;
  font-weight: 300;
  letter-spacing: 2px;
}

.tab-container {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
  gap: 12px;
}

.tab-btn {
  padding: 10px 22px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 0.9rem;
  letter-spacing: 1px;
}

.tab-btn:hover {
  background: rgba(255,255,255,0.15);
}

.tab-btn.active {
  background: white;
  color: #203a43;
  font-weight: 600;
  border-color: white;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(255,255,255,0.06);
  padding: 25px 30px;
  border-radius: 16px;
  min-width: 220px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
}

.stat-label {
  font-size: 0.85rem;
  opacity: 0.7;
  letter-spacing: 1px;
}

.stat-value {
  font-size: 1.8rem;
  margin: 8px 0;
}

.stat-count {
  font-size: 0.85rem;
  opacity: 0.8;
}

#drillView {
  display: none;
  margin-top: 30px;
}

.doc-row {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.08);
  padding: 15px 20px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.doc-row:hover {
  background: rgba(255,255,255,0.15);
}

.doc-time {
  font-size: 0.75rem;
  opacity: 0.7;
  margin-top: 4px;
}

.back-btn {
  margin-bottom: 20px;
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
}

.back-btn:hover {
  background: rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="wrapper">

<h1>QuoteValet Dashboard</h1>

<div class="tab-container">
  <div class="tab-btn active" onclick="switchTab(event,'Accepted')">Accepted</div>
  <div class="tab-btn" onclick="switchTab(event,'Views')">Views</div>
</div>

<div id="mainView">
  <div class="stats-container" id="statsContainer"></div>
  <div id="leaderboard"></div>
</div>

<div id="drillView">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <div id="drillContent"></div>
</div>

</div>

<script>

const DATA_URL = "https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData";

let allData = [];
let currentTab = "Accepted";

function handleData(data) {
  allData = data;
  renderDashboard();
}

function switchTab(e, tab) {
  currentTab = tab;

  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");

  renderDashboard();
}

function renderDashboard() {

  const statsContainer = document.getElementById("statsContainer");
  const leaderboard = document.getElementById("leaderboard");

  statsContainer.innerHTML = "";
  leaderboard.innerHTML = "";

  const now = new Date();
  const todayStr = now.toDateString();

  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const lastMonthDate = new Date(thisYear, thisMonth - 1, 1);
  const lastMonth = lastMonthDate.getMonth();
  const lastMonthYear = lastMonthDate.getFullYear();

  const eventFilter = currentTab === "Accepted"
    ? "QuoteValet.Accepted"
    : "QuoteValet.ViewedExternal";

  const filtered = allData.filter(r => r.EventFullName === eventFilter);

  const todayData = filtered.filter(r => new Date(r.EventDateTime).toDateString() === todayStr);
  const thisMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });
  const lastMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === lastMonth && d.getFullYear() === lastMonthYear;
  });

  createCard("Today", todayData);
  createCard("This Month", thisMonthData);
  createCard("Last Month", lastMonthData);

  if (currentTab === "Accepted") {
    createLeaderboard(thisMonthData);
  }
}

function createCard(label, dataset) {

  const total = dataset.reduce((sum, r) => sum + parseFloat(r.GrandTotal || 0), 0);

  const card = document.createElement("div");
  card.className = "stat-card";
  card.onclick = () => showDrill(label, dataset);

  card.innerHTML = `
    <div class="stat-label">${label}</div>
    <div class="stat-value">£${total.toFixed(2)}</div>
    <div class="stat-count">${dataset.length} ${currentTab}</div>
  `;

  document.getElementById("statsContainer").appendChild(card);
}

function createLeaderboard(data) {

  const leaderboard = document.getElementById("leaderboard");

  const sales = {};

  data.forEach(r => {
    const rep = r.SalesRep || "Unknown";
    sales[rep] = (sales[rep] || 0) + parseFloat(r.GrandTotal || 0);
  });

  const sorted = Object.entries(sales)
    .sort((a,b) => b[1] - a[1])
    .slice(0,3);

  if (sorted.length === 0) return;

  const div = document.createElement("div");
  div.innerHTML = "<h3>Top 3 This Month</h3>";

  sorted.forEach(([rep, total]) => {
    const row = document.createElement("div");
    row.textContent = `${rep} - £${total.toFixed(2)}`;
    div.appendChild(row);
  });

  leaderboard.appendChild(div);
}

function showDrill(label, dataset) {

  document.getElementById("mainView").style.display = "none";
  document.getElementById("drillView").style.display = "block";

  const container = document.getElementById("drillContent");
  container.innerHTML = `<h3>${label} - ${currentTab}</h3>`;

  dataset.sort((a,b) => new Date(b.EventDateTime) - new Date(a.EventDateTime));

  dataset.forEach(r => {

    let raw = r.EventDateTime;
    raw = raw.replace(/(\.\d{3})\d+Z$/, "$1Z");
    const d = new Date(raw);

    let timeDisplay = "";

    if (!isNaN(d)) {
      if (label === "Today") {
        timeDisplay = d.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit"
        });
      } else {
        timeDisplay = d.toLocaleString("en-GB", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }
    }

    const row = document.createElement("div");
    row.className = "doc-row";
    row.innerHTML = `
      <div>
        ${r.DocNo || ""} - ${r.SoldToCompany || ""}
        <div class="doc-time">${timeDisplay}</div>
      </div>
      <div>£${parseFloat(r.GrandTotal || 0).toFixed(2)}</div>
    `;

    row.onclick = () => {
      if (r.SalesRepFacingUrl) {
        window.open(r.SalesRepFacingUrl, "_blank");
      }
    };

    container.appendChild(row);
  });
}

function goBack() {
  document.getElementById("drillView").style.display = "none";
  document.getElementById("mainView").style.display = "block";
}

</script>

<script src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData"></script>

</body>
</html>
