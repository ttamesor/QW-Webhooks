<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(140deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1300px;
  padding: 60px 20px;
}

h1 {
  text-align: center;
  font-weight: 400;
  margin-bottom: 40px;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 40px;
}

.tab-btn {
  padding: 10px 26px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.2s ease;
}

.tab-btn.active {
  background: white;
  color: #203a43;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  padding: 30px 40px;
  border-radius: 18px;
  min-width: 260px;
  transition: 0.25s ease;
}

.stat-card.clickable { cursor: pointer; }

.stat-card.clickable:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
}

.stat-title { font-size: 0.9rem; opacity: 0.7; margin-bottom: 8px; }
.stat-number { font-size: 2rem; font-weight: 600; }
.stat-sub { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }

.heat-up { color: #4caf50; }
.heat-down { color: #ff5252; }

#drillView { display:none; margin-top:30px; }

.sort-select {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  margin-bottom: 20px;
}

.doc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.08);
  padding: 20px 26px;
  border-radius: 14px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: 0.2s;
}

.doc-row:hover { background: rgba(255,255,255,0.18); }

.back-btn {
  margin-bottom: 20px;
  padding: 6px 16px;
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

.activity-feed {
  margin-top: 40px;
}

.activity-item {
  padding: 6px 0;
  font-size: 0.9rem;
  opacity: 0.8;
}

</style>
</head>

<body>
<div class="wrapper">

<h1>🚀 QuoteValet Live Dashboard</h1>

<div class="tab-container">
  <div class="tab-btn active" onclick="switchTab(event,'Accepted')">💰 Accepted</div>
  <div class="tab-btn" onclick="switchTab(event,'Views')">👀 Views</div>
</div>

<div id="mainView">
  <div class="stats-container" id="statsContainer"></div>
  <div id="activityFeed" class="activity-feed"></div>
</div>

<div id="drillView">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <select id="sortSelect" class="sort-select" onchange="renderDrill()"></select>
  <div id="drillContent"></div>
</div>

</div>

<script>

let allData=[];
let currentTab="Accepted";
let currentDataset=[];

function handleData(data){
  allData=data||[];
  renderDashboard();
}

function switchTab(e,tab){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  goBack();
  renderDashboard();
}

function renderDashboard(){

  document.getElementById("statsContainer").innerHTML="";
  document.getElementById("activityFeed").innerHTML="";

  const now=new Date();
  const thisMonth=now.getMonth();
  const thisYear=now.getFullYear();
  const lastMonthDate=new Date(thisYear,thisMonth-1,1);
  const lastMonth=lastMonthDate.getMonth();
  const lastMonthYear=lastMonthDate.getFullYear();

  const eventFilter=currentTab==="Accepted"?"QuoteValet.Accepted":"QuoteValet.ViewedExternal";
  const filtered=allData.filter(r=>r.EventFullName===eventFilter);

  const thisMonthData=filtered.filter(r=>{
    const d=new Date(r.EventDateTime);
    return d.getMonth()===thisMonth&&d.getFullYear()===thisYear;
  });

  const lastMonthData=filtered.filter(r=>{
    const d=new Date(r.EventDateTime);
    return d.getMonth()===lastMonth&&d.getFullYear()===lastMonthYear;
  });

  createCard("📅 This Month",thisMonthData);
  createCard("📆 Last Month",lastMonthData);

  createActivityFeed(filtered);
}

function createCard(title,dataset){

  const value=dataset.reduce((s,r)=>s+parseFloat(r.GrandTotal||0),0);
  const card=document.createElement("div");
  card.className="stat-card clickable";
  card.onclick=()=>showDrill(dataset);

  card.innerHTML=`
    <div class="stat-title">${title}</div>
    <div class="stat-number">${dataset.length} deals</div>
    <div class="stat-sub">£${value.toFixed(2)}</div>
  `;

  document.getElementById("statsContainer").appendChild(card);
}

function showDrill(dataset){

  document.getElementById("mainView").style.display="none";
  document.getElementById("drillView").style.display="block";

  if(currentTab==="Views"){
    const grouped={};
    dataset.forEach(r=>{
      const key=r.DocNo;
      if(!grouped[key]){
        grouped[key]={...r,viewCount:1,latestView:r.EventDateTime};
      }else{
        grouped[key].viewCount++;
        if(new Date(r.EventDateTime)>new Date(grouped[key].latestView)){
          grouped[key].latestView=r.EventDateTime;
        }
      }
    });
    currentDataset=Object.values(grouped);
  }else{
    currentDataset=dataset;
  }

  setupSort();
  renderDrill();
}

function setupSort(){
  const select=document.getElementById("sortSelect");
  if(currentTab==="Views"){
    select.innerHTML=`
      <option value="latest">Latest View</option>
      <option value="views">Most Views</option>
    `;
  }else{
    select.innerHTML=`
      <option value="recent">Most Recent</option>
      <option value="value">Highest Value</option>
    `;
  }
}

function renderDrill(){

  const sortBy=document.getElementById("sortSelect").value;
  let sorted=[...currentDataset];

  if(currentTab==="Views"){
    if(sortBy==="views") sorted.sort((a,b)=>b.viewCount-a.viewCount);
    else sorted.sort((a,b)=>new Date(b.latestView)-new Date(a.latestView));
  }else{
    if(sortBy==="value") sorted.sort((a,b)=>parseFloat(b.GrandTotal||0)-parseFloat(a.GrandTotal||0));
    else sorted.sort((a,b)=>new Date(b.EventDateTime)-new Date(a.EventDateTime));
  }

  const container=document.getElementById("drillContent");
  container.innerHTML="";

  sorted.forEach(r=>{
    const row=document.createElement("div");
    row.className="doc-row";

    if(currentTab==="Views"){
      row.innerHTML=`
        <div>
          <strong>${r.DocNo}</strong> - ${r.DocName||""}
          <div>${new Date(r.latestView).toLocaleString("en-GB",{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})}</div>
        </div>
        <div>${r.viewCount} views</div>
      `;
    }else{
      row.innerHTML=`
        <div>
          <strong>${r.DocNo}</strong> - ${r.DocName||""}
          <div>${new Date(r.EventDateTime).toLocaleString("en-GB",{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})}</div>
        </div>
        <div>£${parseFloat(r.GrandTotal||0).toFixed(2)}</div>
      `;
    }

    row.onclick=()=>{
      if(r.SalesRepFacingUrl){
        window.open(r.SalesRepFacingUrl,"_blank");
      }
    };

    container.appendChild(row);
  });
}

function createActivityFeed(data){
  const latest=[...data].sort((a,b)=>new Date(b.EventDateTime)-new Date(a.EventDateTime)).slice(0,5);

  let html="<h3>📡 Live Activity</h3>";
  latest.forEach(r=>{
    const emoji=r.EventFullName.includes("Accepted")?"💰":"👀";
    html+=`<div class="activity-item">${emoji} ${r.DocNo} - ${r.DocName||""}</div>`;
  });

  document.getElementById("activityFeed").innerHTML=html;
}

function goBack(){
  document.getElementById("drillView").style.display="none";
  document.getElementById("mainView").style.display="block";
}

setInterval(()=>{
  const script=document.createElement("script");
  script.src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec
?callback=handleData&ts="+new Date().getTime();
  document.body.appendChild(script);
},60000);

</script>

<script src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec
?callback=handleData"></script>

</body>
</html>
