<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteWerks Live Sales Dashboard</title>
<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #0f2027, #0b1114 70%);
  color:#00ff99;
  font-family:'Segoe UI', Arial, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container {
  width:90%;
  max-width:1400px;
  text-align:center;
}

.header {
  font-size:22px;
  margin-bottom:20px;
  opacity:0.85;
}

.value {
  font-size:72px;
  font-weight:700;
  color:#00ffcc;
  text-shadow:0 0 20px rgba(0,255,200,0.6);
}

.company {
  font-size:36px;
  margin-top:10px;
}

.grid {
  display:flex;
  justify-content:space-around;
  margin-top:40px;
  font-size:20px;
}

.card {
  padding:20px;
}

.leaderboard {
  margin-top:30px;
  font-size:18px;
}

.pulse {
  animation:pulse 1.2s ease;
}

@keyframes pulse {
  0% { transform:scale(1); }
  50% { transform:scale(1.05); }
  100% { transform:scale(1); }
}
</style>
</head>
<body>

<div class="container">

  <div id="headline"></div>

  <div id="deal"></div>

  <div class="grid">
    <div class="card" id="today"></div>
    <div class="card" id="month"></div>
    <div class="card" id="lifetime"></div>
  </div>

  <div class="leaderboard" id="leaderboard"></div>

</div>

<script>
const endpoint = "https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec";

let accepted = [];
let index = 0;
let lastCount = 0;

function loadData() {
  fetch(endpoint)
    .then(res => res.json())
    .then(rows => {

      accepted = rows.filter(r =>
        r.EventType && r.EventType.toLowerCase().includes("accepted")
      );

      const now = new Date();
      const todayStr = now.toDateString();

      const today = accepted.filter(r =>
        new Date(r.Timestamp).toDateString() === todayStr
      );

      const month = accepted.filter(r => {
        const d = new Date(r.Timestamp);
        return d.getMonth() === now.getMonth() &&
               d.getFullYear() === now.getFullYear();
      });

      const sum = arr => arr.reduce((s,r)=>s+(parseFloat(r.SubTotal)||0),0);

      document.getElementById("today").innerHTML =
        "Today<br><strong>£" +
        sum(today).toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</strong>";

      document.getElementById("month").innerHTML =
        "Month<br><strong>£" +
        sum(month).toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</strong>";

      document.getElementById("lifetime").innerHTML =
        "Lifetime<br><strong>£" +
        sum(accepted).toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</strong>";

      document.getElementById("headline").innerHTML =
        "Total Accepted: " + accepted.length;

      buildLeaderboard();

      if (accepted.length > lastCount) {
        playSound();
      }

      lastCount = accepted.length;
    });
}

function buildLeaderboard() {
  const reps = {};
  accepted.forEach(r=>{
    const rep = r.SalesRep || "Unknown";
    reps[rep] = (reps[rep] || 0) + (parseFloat(r.SubTotal)||0);
  });

  const sorted = Object.entries(reps)
    .sort((a,b)=>b[1]-a[1]);

  let html = "<strong>Leaderboard</strong><br>";
  sorted.forEach(([rep,total])=>{
    html += rep + ": £" +
      total.toLocaleString("en-GB",{minimumFractionDigits:2}) + "<br>";
  });

  document.getElementById("leaderboard").innerHTML = html;
}

function showNext() {
  if (accepted.length === 0) return;

  const row = accepted[index];
  const formattedValue =
    parseFloat(row.SubTotal)
    .toLocaleString("en-GB",{minimumFractionDigits:2});

  const dealDiv = document.getElementById("deal");
  dealDiv.classList.remove("pulse");

  dealDiv.innerHTML =
    "<div class='value'>£" + formattedValue + "</div>" +
    "<div class='company'>" + row.SoldToCompany + "</div>";

  void dealDiv.offsetWidth;
  dealDiv.classList.add("pulse");

  index = (index + 1) % accepted.length;
}

function playSound() {
  const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-cash-register-purchase-707.mp3");
  audio.volume = 0.2;
  audio.play();
}

loadData();
setInterval(loadData, 60000);
setInterval(showNext, 5000);
</script>

</body>
</html>
