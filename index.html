<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteWerks Live Sales</title>
<meta http-equiv="refresh" content="15">
<style>
body {
  margin:0;
  background:#111;
  color:#00ff7f;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#ticker {
  text-align:center;
  font-size:42px;
}
.small {
  font-size:24px;
}
</style>
</head>
<body>

<div id="ticker">Loading...</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8z7ljXIvH5_gi8IiCgNy3TyHwRrphzsJKxLJxB_KlaFNNafDDYsUtiAwamqlOkqQWzME3onMtizc6/pub?output=csv";

fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(csvUrl))
  .then(response => response.text())
  .then(csv => {

    const rows = csv.trim().split("\n").slice(1)
      .map(r => r.split(","))
      .filter(r => r.length >= 5);

    const accepted = rows.filter(r =>
      r[1] && r[1].toLowerCase().includes("accepted")
    );

    const totalCount = accepted.length;

    const totalValue = accepted.reduce((sum, r) => {
      return sum + (parseFloat(r[4]) || 0);
    }, 0);

    const lastFive = accepted.slice(-5);

    let index = 0;

    function showNext() {

      if (accepted.length === 0) {
        document.getElementById("ticker").innerHTML =
          "No accepted quotes yet";
        return;
      }

      const row = lastFive[index];
      const company = row[3];
      const value = parseFloat(row[4] || 0)
        .toLocaleString("en-GB", {minimumFractionDigits:2});

      document.getElementById("ticker").innerHTML =
        "<div class='small'>Total Accepted: " + totalCount + "</div>" +
        "<div class='small'>Total Value: £" + 
        totalValue.toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</div>" +
        "<div style='margin-top:30px'>£" + value + " - " + company + "</div>";

      index = (index + 1) % lastFive.length;
    }

    showNext();
    setInterval(showNext, 4000);
  });
</script>

</body>
</html>
