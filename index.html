<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Roboto", sans-serif;
  background: linear-gradient(140deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1300px;
  padding: 60px 20px;
}

h1 {
  text-align: center;
  font-weight: 400;
  margin-bottom: 10px;
}

#lastUpdated {
  text-align: center;
  opacity: 0.6;
  margin-bottom: 30px;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 40px;
}

.tab-btn {
  padding: 10px 26px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
}

.tab-btn.active {
  background: white;
  color: #203a43;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  padding: 30px 40px;
  border-radius: 18px;
  min-width: 220px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 28px;
}

.info-panel {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 24px 28px;
}

.panel-item {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
}

.hot {
  color: #ffb347;
}

.attention {
  color: #ff5e5e;
}
</style>
</head>

<body>

<div class="wrapper">

  <h1>🚀 QuoteValet Live Dashboard</h1>
  <div id="lastUpdated"></div>

  <div class="tab-container">
    <div class="tab-btn active" onclick="switchTab(event,'Accepted')">💰 Accepted</div>
    <div class="tab-btn" onclick="switchTab(event,'Views')">👀 Views</div>
    <div class="tab-btn" onclick="switchTab(event,'NotViewed')">📭 Not Viewed</div>
  </div>

  <div id="statsContainer" class="stats-container"></div>

  <div class="info-grid">
    <div id="panelLeft" class="info-panel"></div>
    <div id="panelRight" class="info-panel"></div>
  </div>

  <div class="info-grid">
    <div id="activityFeed" class="info-panel"></div>
    <div id="attentionQuotes" class="info-panel"></div>
  </div>

</div>

<script>
const APPS_SCRIPT_BASE = "YOUR_URL_HERE";

let allData = [];
let quotes = {};
let currentTab = "Accepted";

function currency(v) {
  return parseFloat(v || 0).toLocaleString("en-GB", { style: "currency", currency: "GBP" });
}

function loadData() {
  const script = document.createElement("script");
  script.src = APPS_SCRIPT_BASE + "?callback=handleData&ts=" + Date.now();
  document.body.appendChild(script);
}

function handleData(data) {
  document.getElementById("lastUpdated").innerText =
    "Updated: " + new Date().toLocaleTimeString("en-GB");

  allData = data || [];
  groupQuotes();
  renderDashboard();
}

function groupQuotes() {
  quotes = {};
  allData.forEach(r => {
    const doc = r.DocNo;
    if (!quotes[doc]) {
      quotes[doc] = { doc: r, views: 0, accepted: false, created: false };
    }

    if (r.EventFullName === "QuoteValet.CreatedForCustomer") {
      quotes[doc].created = true;
    }

    if (r.EventFullName === "QuoteValet.ViewedExternal") {
      quotes[doc].views++;
    }

    if (r.EventFullName === "QuoteValet.Accepted") {
      quotes[doc].accepted = true;
    }
  });
}

function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  renderDashboard();
}

function renderDashboard() {
  const container = document.getElementById("statsContainer");
  container.innerHTML = "";

  const list = Object.values(quotes);

  const pipeline = list.filter(q => q.created && !q.accepted)
    .reduce((sum, q) => sum + parseFloat(q.doc.SubTotal || 0), 0);

  const accepted = list.filter(q => q.accepted)
    .reduce((sum, q) => sum + parseFloat(q.doc.SubTotal || 0), 0);

  createCard("📊 Pipeline", currency(pipeline));
  createCard("💰 Accepted", currency(accepted));

  renderRepStats(list);
  renderStale(list);
  renderAttention(list);
}

function createCard(title, value) {
  const div = document.createElement("div");
  div.className = "stat-card";
  div.innerHTML = `<div>${title}</div><div style="font-size:2rem">${value}</div>`;
  document.getElementById("statsContainer").appendChild(div);
}

function renderRepStats(list) {
  const reps = {};

  list.forEach(q => {
    const rep = q.doc.SalesRep || "Unknown";
    if (!reps[rep]) reps[rep] = 0;
    if (q.accepted) reps[rep] += parseFloat(q.doc.SubTotal || 0);
  });

  let html = "<h3>👤 Sales Performance</h3>";
  Object.entries(reps).forEach(([r,v])=>{
    html += `<div>${r} - ${currency(v)}</div>`;
  });

  document.getElementById("panelLeft").innerHTML = html;
}

function renderStale(list) {
  const stale = list.filter(q => q.created && !q.accepted && q.views === 0);

  let html = "<h3>🧊 Stale Quotes</h3>";
  stale.slice(0,8).forEach(q=>{
    html += `<div class="panel-item">${q.doc.DocNo}</div>`;
  });

  document.getElementById("panelRight").innerHTML = html;
}

function getScore(q) {
  let s = q.views * 2;
  if (!q.accepted) s += 5;
  if (parseFloat(q.doc.SubTotal||0)>3000) s += 5;
  return s;
}

function renderAttention(list) {
  const att = list.filter(q => !q.accepted)
    .sort((a,b)=>getScore(b)-getScore(a))
    .slice(0,8);

  let html = "<h3>🚨 Attention</h3>";
  att.forEach(q=>{
    html += `<div class="panel-item attention">${q.doc.DocNo} (${q.views})</div>`;
  });

  document.getElementById("attentionQuotes").innerHTML = html;
}

setInterval(loadData, 60000);
loadData();
</script>

</body>
</html>
