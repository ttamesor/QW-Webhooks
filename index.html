<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(140deg, #0f2027 0%, #1b3a46 40%, #2c5364 100%);
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1200px;
  padding: 60px 20px;
  text-align: center;
}

h1 {
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 40px;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 50px;
}

.tab-btn {
  padding: 10px 24px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  transition: 0.2s ease;
}

.tab-btn:hover {
  background: rgba(255,255,255,0.15);
}

.tab-btn.active {
  background: #ffffff;
  color: #203a43;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 50px;
}

.stat-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  padding: 30px 40px;
  border-radius: 18px;
  min-width: 240px;
  transition: 0.25s ease;
}

.stat-card.clickable {
  cursor: pointer;
}

.stat-card.clickable:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.45);
}

.stat-title {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-bottom: 10px;
}

.stat-number {
  font-size: 2.2rem;
  font-weight: 600;
}

.stat-sub {
  margin-top: 8px;
  font-size: 0.9rem;
  opacity: 0.7;
}

#drillView {
  display: none;
  margin-top: 40px;
}

.back-btn {
  margin-bottom: 25px;
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  font-size: 0.9rem;
}

.back-btn:hover {
  background: rgba(255,255,255,0.25);
}

.sort-select {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  font-family: 'Inter', sans-serif;
  margin-bottom: 25px;
}

.doc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.08);
  padding: 22px 28px;
  border-radius: 14px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: 0.2s ease;
}

.doc-row:hover {
  background: rgba(255,255,255,0.18);
  transform: translateX(6px);
}

.view-count {
  font-size: 2rem;
  font-weight: 700;
}

.doc-meta {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-top: 6px;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>QuoteValet Dashboard</h1>

<div class="tab-container">
  <div class="tab-btn active" onclick="switchTab(event,'Accepted')">Accepted</div>
  <div class="tab-btn" onclick="switchTab(event,'Views')">Views</div>
</div>

<div id="mainView">
  <div class="stats-container" id="statsContainer"></div>
</div>

<div id="drillView">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <div>
    <select id="sortSelect" class="sort-select" onchange="renderDrill()"></select>
  </div>
  <div id="drillContent"></div>
</div>

</div>

<script>

const DATA_URL = "https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData";

let allData = [];
let currentTab = "Accepted";
let currentDataset = [];

function handleData(data) {
  allData = data;
  renderDashboard();
}

function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");
  renderDashboard();
}

function renderDashboard() {

  document.getElementById("statsContainer").innerHTML = "";

  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const eventFilter = currentTab === "Accepted"
    ? "QuoteValet.Accepted"
    : "QuoteValet.ViewedExternal";

  const filtered = allData.filter(r => r.EventFullName === eventFilter);

  const thisMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });

  createCard("This Month", thisMonthData.length, thisMonthData);
}

function createCard(title, count, dataset) {

  const card = document.createElement("div");
  card.className = "stat-card";

  if (count > 0) {
    card.classList.add("clickable");
    card.onclick = () => showDrill(dataset);
  }

  card.innerHTML = `
    <div class="stat-title">${title}</div>
    <div class="stat-number">${count}</div>
    <div class="stat-sub">${count === 1 ? "Result" : "Results"}</div>
  `;

  document.getElementById("statsContainer").appendChild(card);
}

function showDrill(dataset) {

  document.getElementById("mainView").style.display = "none";
  document.getElementById("drillView").style.display = "block";

  if (currentTab === "Views") {
    const grouped = {};
    dataset.forEach(r => {
      const key = r.DocNo;
      if (!grouped[key]) {
        grouped[key] = { ...r, viewCount: 1, latestView: r.EventDateTime };
      } else {
        grouped[key].viewCount++;
        if (new Date(r.EventDateTime) > new Date(grouped[key].latestView)) {
          grouped[key].latestView = r.EventDateTime;
        }
      }
    });
    currentDataset = Object.values(grouped);
  } else {
    currentDataset = dataset;
  }

  setupSortOptions();
  renderDrill();
}

function setupSortOptions() {
  const select = document.getElementById("sortSelect");

  if (currentTab === "Views") {
    select.innerHTML = `
      <option value="latest">Latest View</option>
      <option value="views">Most Views</option>
    `;
  } else {
    select.innerHTML = `
      <option value="recent">Most Recent</option>
      <option value="value">Highest Value</option>
    `;
  }
}

function renderDrill() {

  const sortBy = document.getElementById("sortSelect").value;
  let sorted = [...currentDataset];

  if (currentTab === "Views") {
    if (sortBy === "views") {
      sorted.sort((a,b) => b.viewCount - a.viewCount);
    } else {
      sorted.sort((a,b) => new Date(b.latestView) - new Date(a.latestView));
    }
  } else {
    if (sortBy === "value") {
      sorted.sort((a,b) => parseFloat(b.GrandTotal||0) - parseFloat(a.GrandTotal||0));
    } else {
      sorted.sort((a,b) => new Date(b.EventDateTime) - new Date(a.EventDateTime));
    }
  }

  const container = document.getElementById("drillContent");
  container.innerHTML = "";

  sorted.forEach(r => {

    const row = document.createElement("div");
    row.className = "doc-row";

    if (currentTab === "Views") {
      row.innerHTML = `
        <div>
          <strong>${r.DocNo}</strong>
          <div class="doc-meta">
            Latest View: ${new Date(r.latestView).toLocaleString("en-GB",{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})}
          </div>
        </div>
        <div class="view-count">${r.viewCount} views</div>
      `;
    } else {
      row.innerHTML = `
        <div>
          <strong>${r.DocNo}</strong>
          <div class="doc-meta">
            ${new Date(r.EventDateTime).toLocaleString("en-GB",{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})}
          </div>
        </div>
        <div>£${parseFloat(r.GrandTotal||0).toFixed(2)}</div>
      `;
    }

    row.onclick = () => {
      if (r.SalesRepFacingUrl) {
        window.open(r.SalesRepFacingUrl, "_blank");
      }
    };

    container.appendChild(row);
  });
}

function goBack() {
  document.getElementById("drillView").style.display = "none";
  document.getElementById("mainView").style.display = "block";
}

</script>

<script src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData"></script>

</body>
</html>
