<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1200px;
  text-align: center;
  padding: 40px 20px;
}

h1 {
  margin-bottom: 30px;
  font-weight: 300;
  letter-spacing: 2px;
}

.tab-container {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
  gap: 12px;
}

.tab-btn {
  padding: 10px 22px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 0.9rem;
  letter-spacing: 1px;
}

.tab-btn:hover { background: rgba(255,255,255,0.15); }
.tab-btn.active {
  background: white;
  color: #203a43;
  font-weight: 600;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(255,255,255,0.06);
  padding: 25px 30px;
  border-radius: 16px;
  min-width: 220px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
}

.stat-number {
  font-size: 2rem;
  font-weight: bold;
  margin-top: 10px;
}

#drillView { display: none; margin-top: 30px; }

.sort-container {
  margin-bottom: 20px;
}

.sort-select {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  font-size: 0.9rem;
}

.doc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.08);
  padding: 18px 24px;
  border-radius: 12px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.doc-row:hover {
  background: rgba(255,255,255,0.18);
  transform: translateX(4px);
}

.view-count {
  font-size: 2rem;
  font-weight: bold;
  text-align: right;
}

.doc-meta {
  font-size: 0.8rem;
  opacity: 0.7;
  margin-top: 6px;
}

.back-btn {
  margin-bottom: 20px;
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

.back-btn:hover { background: rgba(255,255,255,0.25); }
</style>
</head>

<body>
<div class="wrapper">

<h1>QuoteValet Dashboard</h1>

<div class="tab-container">
  <div class="tab-btn active" onclick="switchTab(event,'Accepted')">Accepted</div>
  <div class="tab-btn" onclick="switchTab(event,'Views')">Views</div>
</div>

<div id="mainView">
  <div class="stats-container" id="statsContainer"></div>
</div>

<div id="drillView">
  <button class="back-btn" onclick="goBack()">← Back</button>

  <div class="sort-container">
    <select class="sort-select" id="sortSelect" onchange="renderDrill()"></select>
  </div>

  <div id="drillContent"></div>
</div>

</div>

<script>

let allData = [];
let currentTab = "Accepted";
let currentDataset = [];

function handleData(data) {
  allData = data;
  renderDashboard();
}

function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");
  goBack();
  renderDashboard();
}

function renderDashboard() {

  const statsContainer = document.getElementById("statsContainer");
  statsContainer.innerHTML = "";

  const now = new Date();
  const todayStr = now.toDateString();

  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const lastMonthDate = new Date(thisYear, thisMonth - 1, 1);
  const lastMonth = lastMonthDate.getMonth();
  const lastMonthYear = lastMonthDate.getFullYear();

  const eventFilter = currentTab === "Accepted"
    ? "QuoteValet.Accepted"
    : "QuoteValet.ViewedExternal";

  const filtered = allData.filter(r => r.EventFullName === eventFilter);

  const todayData = filtered.filter(r =>
    new Date(r.EventDateTime).toDateString() === todayStr
  );

  const thisMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });

  const lastMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === lastMonth && d.getFullYear() === lastMonthYear;
  });

  createCard("Today", todayData);
  createCard("This Month", thisMonthData);
  createCard("Last Month", lastMonthData);
}

function createCard(label, dataset) {

  const card = document.createElement("div");
  card.className = "stat-card";

  let displayValue = dataset.length;

  if (currentTab === "Accepted") {
    const totalValue = dataset.reduce((sum, r) => sum + parseFloat(r.GrandTotal||0), 0);
    displayValue = "£" + totalValue.toFixed(2) + "<div class='stat-number'>" + dataset.length + " docs</div>";
  } else {
    displayValue = "<div class='stat-number'>" + dataset.length + "</div> views";
  }

  card.innerHTML = `<div>${label}</div><div class="stat-number">${displayValue}</div>`;
  card.onclick = () => showDrill(dataset);

  document.getElementById("statsContainer").appendChild(card);
}

function showDrill(dataset) {

  document.getElementById("mainView").style.display = "none";
  document.getElementById("drillView").style.display = "block";

  if (currentTab === "Views") {

    const grouped = {};

    dataset.forEach(r => {
      const key = r.DocNo;
      if (!grouped[key]) {
        grouped[key] = { ...r, viewCount: 1, latestView: r.EventDateTime };
      } else {
        grouped[key].viewCount++;
        if (new Date(r.EventDateTime) > new Date(grouped[key].latestView)) {
          grouped[key].latestView = r.EventDateTime;
        }
      }
    });

    currentDataset = Object.values(grouped);

  } else {
    currentDataset = dataset;
  }

  setupSortOptions();
  renderDrill();
}

function setupSortOptions() {

  const select = document.getElementById("sortSelect");

  if (currentTab === "Views") {
    select.innerHTML = `
      <option value="latest_desc">Latest View - Newest First</option>
      <option value="latest_asc">Latest View - Oldest First</option>
      <option value="views_desc">Most Views - High to Low</option>
      <option value="views_asc">Most Views - Low to High</option>
    `;
  } else {
    select.innerHTML = `
      <option value="recent_desc">Most Recent</option>
      <option value="recent_asc">Oldest First</option>
      <option value="value_desc">Highest Value</option>
      <option value="value_asc">Lowest Value</option>
    `;
  }
}

function renderDrill() {

  const sortBy = document.getElementById("sortSelect").value;
  let sorted = [...currentDataset];

  if (currentTab === "Views") {

    if (sortBy === "views_desc") sorted.sort((a,b) => b.viewCount - a.viewCount);
    else if (sortBy === "views_asc") sorted.sort((a,b) => a.viewCount - b.viewCount);
    else if (sortBy === "latest_asc") sorted.sort((a,b) => new Date(a.latestView) - new Date(b.latestView));
    else sorted.sort((a,b) => new Date(b.latestView) - new Date(a.latestView));

  } else {

    if (sortBy === "value_desc") sorted.sort((a,b) => parseFloat(b.GrandTotal||0) - parseFloat(a.GrandTotal||0));
    else if (sortBy === "value_asc") sorted.sort((a,b) => parseFloat(a.GrandTotal||0) - parseFloat(b.GrandTotal||0));
    else if (sortBy === "recent_asc") sorted.sort((a,b) => new Date(a.EventDateTime) - new Date(b.EventDateTime));
    else sorted.sort((a,b) => new Date(b.EventDateTime) - new Date(a.EventDateTime));

  }

  const container = document.getElementById("drillContent");
  container.innerHTML = "";

  sorted.forEach(r => {

    const row = document.createElement("div");
    row.className = "doc-row";

    if (currentTab === "Views") {

      row.innerHTML = `
        <div>
          <strong>${r.DocNo}</strong>
          <div class="doc-meta">
            Latest View:
            ${new Date(r.latestView).toLocaleString("en-GB",{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})}
          </div>
        </div>
        <div class="view-count">${r.viewCount}</div>
      `;

    } else {

      row.innerHTML = `
        <div>
          <strong>${r.DocNo}</strong>
          <div class="doc-meta">
            ${new Date(r.EventDateTime).toLocaleString("en-GB",{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})}
          </div>
        </div>
        <div class="view-count">£${parseFloat(r.GrandTotal||0).toFixed(2)}</div>
      `;

    }

    row.onclick = () => {
      if (r.SalesRepFacingUrl) window.open(r.SalesRepFacingUrl, "_blank");
    };

    container.appendChild(row);
  });
}

function goBack() {
  document.getElementById("drillView").style.display = "none";
  document.getElementById("mainView").style.display = "block";
}

</script>

<script src="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData"></script>

</body>
</html>
