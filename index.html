<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Roboto", sans-serif;
  background: linear-gradient(140deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1300px;
  padding: 60px 20px;
}

h1 {
  text-align: center;
  font-weight: 400;
  margin-bottom: 40px;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 40px;
}

.tab-btn {
  padding: 10px 26px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.2s ease;
  font-weight: 500;
}

.tab-btn:hover { background: rgba(255,255,255,0.15); }

.tab-btn.active {
  background: white;
  color: #203a43;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  padding: 30px 40px;
  border-radius: 18px;
  min-width: 260px;
  transition: 0.25s ease;
}

.stat-card.clickable { cursor: pointer; }

.stat-card.clickable:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
}

.stat-title { font-size: 0.9rem; opacity: 0.7; margin-bottom: 8px; }
.stat-number { font-size: 2.6rem; font-weight: 600; }
.stat-sub { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }

#drillView { display:none; margin-top:30px; }

.doc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.08);
  padding: 22px 26px;
  border-radius: 14px;
  margin-bottom: 14px;
  cursor: pointer;
}

.doc-row:hover { background: rgba(255,255,255,0.18); }

.view-count {
  font-size: 2.2rem;
  font-weight: 700;
  color: #00e0ff;
}

.back-btn {
  margin-bottom: 20px;
  padding: 6px 16px;
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

.activity-feed { margin-top: 40px; }

.activity-item {
  padding: 6px 0;
  font-size: 0.9rem;
  opacity: 0.85;
}

.leaderboard {
  margin-top: 40px;
}

.leaderboard-item {
  padding: 6px 0;
  font-size: 0.95rem;
}
</style>
</head>

<body>
<div class="wrapper">

<h1>🚀 QuoteValet Live Dashboard</h1>

<div class="tab-container">
  <div class="tab-btn active" onclick="switchTab(event,'Accepted')">💰 Accepted</div>
  <div class="tab-btn" onclick="switchTab(event,'Views')">👀 Views</div>
</div>

<div id="mainView">
  <div class="stats-container" id="statsContainer"></div>
  <div id="leaderboard" class="leaderboard"></div>
  <div id="activityFeed" class="activity-feed"></div>
</div>

<div id="drillView">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <div id="drillContent"></div>
</div>

</div>

<script>

const APPS_SCRIPT_BASE =
"https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec";

let allData = [];
let currentTab = "Accepted";
let currentDataset = [];
let currentScript;

function loadData() {

  if(currentScript){
    currentScript.remove();
  }

  const script = document.createElement("script");
  script.src = APPS_SCRIPT_BASE + "?callback=handleData&ts=" + new Date().getTime();

  currentScript = script;
  document.body.appendChild(script);
}

function handleData(data) {
  allData = data || [];
  renderDashboard();
}

function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  goBack();
  renderDashboard();
}

function renderDashboard() {

  document.getElementById("statsContainer").innerHTML = "";
  document.getElementById("activityFeed").innerHTML = "";
  document.getElementById("leaderboard").innerHTML = "";

  const now = new Date();

  const eventFilter = currentTab === "Accepted"
    ? "QuoteValet.Accepted"
    : "QuoteValet.ViewedExternal";

  const filtered = allData.filter(r => r.EventFullName === eventFilter);

  const todayUK = now.toLocaleDateString("en-GB");

  const todayData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.toLocaleDateString("en-GB") === todayUK;
  });

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayUK = yesterday.toLocaleDateString("en-GB");

  const yesterdayData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.toLocaleDateString("en-GB") === yesterdayUK;
  });

  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const thisMonthData = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });

  createCard("📆 Today", todayData);
  createCard("📅 Yesterday", yesterdayData);
  createCard("📅 This Month", thisMonthData);

  if (currentTab === "Accepted") {
    renderLeaderboard(thisMonthData);
    createActivityFeed(filtered, "Most Recent Acceptances");
  } else {
    createActivityFeed(filtered, "Live Views");
  }
}

function createCard(title, dataset) {

  const count = dataset.length;
  const value = dataset.reduce((s, r) => s + parseFloat(r.SubTotal || 0), 0);

  const card = document.createElement("div");
  card.className = "stat-card";

  if (count > 0) {
    card.classList.add("clickable");
    card.onclick = () => showDrill(dataset);
  }

  card.innerHTML = `
    <div class="stat-title">${title}</div>
    <div class="stat-number">${count}</div>
    <div class="stat-sub">
      ${currentTab === "Accepted"
        ? "accepted · " + value.toLocaleString("en-GB",{style:"currency",currency:"GBP"})
        : "events"}
    </div>
  `;

  document.getElementById("statsContainer").appendChild(card);
}

function renderLeaderboard(data) {

  const totals = {};

  data.forEach(r => {

    const rep = r.SalesRep || "Unknown";

    if (!totals[rep]) totals[rep] = {value:0,deals:0};

    totals[rep].value += parseFloat(r.SubTotal || 0);
    totals[rep].deals++;

  });

  const sorted = Object.entries(totals)
    .sort((a,b) => b[1].value - a[1].value);

  let html = "<h3>🏆 Top Performers This Month</h3>";

  sorted.forEach(([rep,stats],i) => {

    html += `<div class="leaderboard-item">
      ${i+1}. ${rep} - ${stats.value.toLocaleString("en-GB",{style:"currency",currency:"GBP"})}
      (${stats.deals} deals)
    </div>`;

  });

  document.getElementById("leaderboard").innerHTML = html;
}

function showDrill(dataset) {

  document.getElementById("mainView").style.display = "none";
  document.getElementById("drillView").style.display = "block";

  if (currentTab === "Views") {

    const grouped = {};

    dataset.forEach(r => {

      const key = r.DocNo || "UNKNOWN";

      if (!grouped[key]) {
        grouped[key] = {...r, viewCount:1, latestView:r.EventDateTime};
      } else {
        grouped[key].viewCount++;
        if (new Date(r.EventDateTime) > new Date(grouped[key].latestView)) {
          grouped[key].latestView = r.EventDateTime;
        }
      }

    });

    currentDataset = Object.values(grouped);

  } else {
    currentDataset = dataset;
  }

  renderDrill();
}

function renderDrill() {

  const container = document.getElementById("drillContent");
  container.innerHTML = "";

  if(currentTab==="Views"){
    currentDataset.sort((a,b)=>b.viewCount-a.viewCount);
  }else{
    currentDataset.sort((a,b)=>new Date(b.EventDateTime)-new Date(a.EventDateTime));
  }

  currentDataset.forEach(r => {

    const row = document.createElement("div");
    row.className = "doc-row";

    row.onclick = () => {
      if(r.SalesRepFacingURL){
        window.open(r.SalesRepFacingURL,"_blank");
      }
    };

    if (currentTab === "Views") {

      row.innerHTML = `
        <div>
          <strong>${r.DocNo}</strong> ${r.DocName || ""}
          <div>Value: ${parseFloat(r.SubTotal||0).toLocaleString("en-GB",{style:"currency",currency:"GBP"})}</div>
          <div>Latest: ${new Date(r.latestView).toLocaleString("en-GB")}</div>
        </div>
        <div class="view-count">${r.viewCount}</div>
      `;

    } else {

      row.innerHTML = `
        <div>
          <strong>${r.DocNo}</strong> ${r.DocName || ""}
          <div>${new Date(r.EventDateTime).toLocaleString("en-GB")}</div>
        </div>
        <div class="view-count">
          ${parseFloat(r.SubTotal||0).toLocaleString("en-GB",{style:"currency",currency:"GBP"})}
        </div>
      `;

    }

    container.appendChild(row);

  });

}

function createActivityFeed(data, title) {

  const latest = [...data]
    .sort((a,b)=>new Date(b.EventDateTime)-new Date(a.EventDateTime))
    .slice(0,6);

  let html = `<h3>📡 ${title}</h3>`;

  latest.forEach(r => {

    const emoji = r.EventFullName.includes("Accepted") ? "💰" : "👀";

    const time = new Date(r.EventDateTime)
      .toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

    html += `<div class="activity-item">
      ${emoji} ${time} - ${r.DocNo} ${r.DocName||""}
    </div>`;

  });

  document.getElementById("activityFeed").innerHTML = html;
}

function goBack() {
  document.getElementById("drillView").style.display = "none";
  document.getElementById("mainView").style.display = "block";
}

setInterval(loadData,60000);
loadData();

</script>

</body>
</html>
