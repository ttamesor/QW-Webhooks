<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:"Roboto",sans-serif;
background:#f4f6f9;
color:#333;
}

.wrapper{
max-width:1400px;
margin:auto;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
margin:0;
font-weight:500;
}

.live-indicator{
background:#e9f7ef;
padding:6px 12px;
border-radius:20px;
font-size:0.8rem;
color:#1e8449;
}

.card-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
border-radius:14px;
padding:22px;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.card-title{
font-size:0.8rem;
color:#7f8c8d;
margin-bottom:8px;
}

.card-number{
font-size:1.9rem;
font-weight:600;
}

.chart-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:30px;
}

.chart-card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.table-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.table-card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
font-size:0.8rem;
color:#7f8c8d;
padding-bottom:10px;
}

td{
padding:10px 0;
border-top:1px solid #eee;
}

.status{
padding:3px 10px;
border-radius:12px;
font-size:0.75rem;
}

.status-accepted{
background:#d4efdf;
color:#1e8449;
}

.activity-item{
font-size:0.9rem;
padding:8px 0;
border-bottom:1px solid #eee;
}

.quote-row{
cursor:pointer;
}

.quote-row:hover{
background:#fafafa;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<h1>QuoteValet Dashboard</h1>
<div class="live-indicator">● Live data from webhooks</div>
</div>

<div class="card-grid">

<div class="card">
<div class="card-title">TOTAL QUOTES</div>
<div id="totalQuotes" class="card-number">0</div>
</div>

<div class="card">
<div class="card-title">TOTAL VIEWS</div>
<div id="totalViews" class="card-number">0</div>
</div>

<div class="card">
<div class="card-title">ACCEPTANCES</div>
<div id="totalAccepted" class="card-number">0</div>
</div>

<div class="card">
<div class="card-title">CONVERSION RATE</div>
<div id="conversionRate" class="card-number">0%</div>
</div>

<div class="card">
<div class="card-title">PIPELINE VALUE</div>
<div id="pipelineValue" class="card-number">£0</div>
</div>

<div class="card">
<div class="card-title">AVG QUOTE VALUE</div>
<div id="avgQuoteValue" class="card-number">£0</div>
</div>

<div class="card">
<div class="card-title">ACCEPTED VALUE</div>
<div id="acceptedValue" class="card-number">£0</div>
</div>

<div class="card">
<div class="card-title">OPTIONS CHANGED</div>
<div id="optionsChanged" class="card-number">0</div>
</div>

</div>

<div class="chart-grid">

<div class="chart-card">
<h3>Views Over Time</h3>
<canvas id="viewsChart"></canvas>
</div>

<div class="chart-card">
<h3>Event Breakdown</h3>
<canvas id="eventChart"></canvas>
</div>

</div>

<div class="table-grid">

<div class="table-card">

<h3>Quote Overview</h3>

<table id="quoteTable">

<thead>

<tr>
<th>Quote</th>
<th>Company</th>
<th>Value</th>
<th>Status</th>
<th>Last Activity</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="table-card">

<h3>Recent Activity</h3>

<div id="activityFeed"></div>

</div>

</div>

</div>

<script>

const APPS_SCRIPT_BASE="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec";

let allData=[];

function loadData(){

const script=document.createElement("script");

script.src=APPS_SCRIPT_BASE+"?callback=handleData&ts="+new Date().getTime();

document.body.appendChild(script);

}

function handleData(data){

allData=data||[];

renderDashboard();

}

function renderDashboard(){

const views=allData.filter(r=>r.EventFullName==="QuoteValet.ViewedExternal");

const accepted=allData.filter(r=>r.EventFullName==="QuoteValet.Accepted");

const options=allData.filter(r=>r.EventFullName==="QuoteValet.OptionChanged");

document.getElementById("totalQuotes").innerText=[...new Set(allData.map(r=>r.DocNo))].length;

document.getElementById("totalViews").innerText=views.length;

document.getElementById("totalAccepted").innerText=accepted.length;

const conversion=views.length>0?(accepted.length/views.length*100).toFixed(1):0;

document.getElementById("conversionRate").innerText=conversion+"%";

const pipeline=views.reduce((s,r)=>s+parseFloat(r.SubTotal||0),0);

document.getElementById("pipelineValue").innerText=pipeline.toLocaleString("en-GB",{style:"currency",currency:"GBP"});

const acceptedValue=accepted.reduce((s,r)=>s+parseFloat(r.SubTotal||0),0);

document.getElementById("acceptedValue").innerText=acceptedValue.toLocaleString("en-GB",{style:"currency",currency:"GBP"});

const avgQuote=accepted.length>0?acceptedValue/accepted.length:0;

document.getElementById("avgQuoteValue").innerText=avgQuote.toLocaleString("en-GB",{style:"currency",currency:"GBP"});

document.getElementById("optionsChanged").innerText=options.length;

renderCharts(views,accepted,options);

renderQuoteTable();

renderActivity();

}

function renderCharts(views,accepted,options){

const hours={};

views.forEach(v=>{

const d=new Date(v.EventDateTime);

const key=d.getHours()+":00";

hours[key]=(hours[key]||0)+1;

});

const labels=Object.keys(hours);

const data=Object.values(hours);

new Chart(document.getElementById("viewsChart"),{

type:"bar",

data:{labels:labels,datasets:[{data:data,backgroundColor:"#3b82f6"}]},

options:{plugins:{legend:{display:false}}}

});

new Chart(document.getElementById("eventChart"),{

type:"doughnut",

data:{labels:["Views","Accepted","Options"],datasets:[{data:[views.length,accepted.length,options.length],backgroundColor:["#3b82f6","#2ecc71","#f39c12"]}]},

});

}

function renderQuoteTable(){

const tbody=document.querySelector("#quoteTable tbody");

tbody.innerHTML="";

const grouped={};

allData.forEach(r=>{

const key=r.DocNo;

if(!grouped[key])grouped[key]=r;

});

Object.values(grouped).forEach(r=>{

const tr=document.createElement("tr");

tr.className="quote-row";

tr.onclick=()=>{

if(r.QuoteValetURL)window.open(r.QuoteValetURL,"_blank");

};

tr.innerHTML=`

<td>${r.DocNo}</td>
<td>${r.DocName||""}</td>
<td>${parseFloat(r.SubTotal||0).toLocaleString("en-GB",{style:"currency",currency:"GBP"})}</td>
<td><span class="status status-accepted">Accepted</span></td>
<td>${new Date(r.EventDateTime).toLocaleString("en-GB")}</td>

`;

tbody.appendChild(tr);

});

}

function renderActivity(){

const feed=document.getElementById("activityFeed");

feed.innerHTML="";

const latest=[...allData].sort((a,b)=>new Date(b.EventDateTime)-new Date(a.EventDateTime)).slice(0,8);

latest.forEach(r=>{

const div=document.createElement("div");

div.className="activity-item";

const emoji=r.EventFullName.includes("Accepted")?"✔":"👁";

div.innerText=emoji+" "+r.DocNo+" "+(r.DocName||"");

feed.appendChild(div);

});

}

setInterval(loadData,60000);

loadData();

</script>

</body>
</html>
