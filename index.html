<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Accepted Dashboard</title>

<style>
body {
  margin:0;
  background:#0c1418;
  color:#00ff99;
  font-family:'Segoe UI', Arial, sans-serif;
}

.container {
  width:90%;
  max-width:1400px;
  margin:auto;
  padding-top:40px;
  text-align:center;
}

.grid {
  display:flex;
  justify-content:space-around;
  margin-bottom:40px;
}

.card {
  padding:20px;
  cursor:pointer;
}

.card:hover {
  background:#122026;
  border-radius:6px;
}

.big {
  font-size:36px;
  font-weight:700;
  color:#00ffcc;
}

.leaderboard {
  font-size:20px;
  margin-bottom:40px;
}

.hidden {
  display:none;
}

.backButton {
  margin-bottom:20px;
  padding:8px 20px;
  border:1px solid #00ff99;
  background:#111;
  color:#00ff99;
  cursor:pointer;
}

.backButton:hover {
  background:#003b33;
}

.listItem {
  padding:12px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.listItem:hover {
  background:#122026;
}

.docTitle {
  font-weight:600;
}

.docValue {
  color:#00ffcc;
}

</style>
</head>

<body>

<div class="container">

  <!-- MAIN DASHBOARD -->
  <div id="mainView">

    <div class="grid">
      <div class="card" id="todayCard"></div>
      <div class="card" id="monthCard"></div>
      <div class="card" id="lastMonthCard"></div>
    </div>

    <div class="leaderboard" id="topReps"></div>

  </div>

  <!-- DRILLDOWN VIEW -->
  <div id="detailView" class="hidden">

    <button class="backButton" onclick="goBack()">Back</button>

    <div id="detailTitle" style="font-size:24px; margin-bottom:20px;"></div>

    <div id="detailList"></div>

  </div>

</div>

<script>

const endpoint = "https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec";

let accepted = [];

function sum(arr, field) {
  return arr.reduce((s,r)=>s+(parseFloat(r[field])||0),0);
}

function filterToday(data) {
  const now = new Date();
  return data.filter(r=>{
    const d = new Date(r.EventDateTime);
    return d.toDateString() === now.toDateString();
  });
}

function filterMonth(data, offset=0) {
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth()+offset, 1);

  return data.filter(r=>{
    const d = new Date(r.EventDateTime);
    return d.getMonth() === target.getMonth() &&
           d.getFullYear() === target.getFullYear();
  });
}

function loadData() {

  fetch(endpoint)
    .then(res=>res.json())
    .then(rows=>{

      accepted = rows.filter(r =>
        r.EventFullName === "QuoteValet.Accepted"
      );

      const today = filterToday(accepted);
      const month = filterMonth(accepted,0);
      const lastMonth = filterMonth(accepted,-1);

      document.getElementById("todayCard").innerHTML =
        "Today<br><div class='big'>£" +
        sum(today,"SubTotal").toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</div>" + today.length + " accepted";

      document.getElementById("monthCard").innerHTML =
        "This Month<br><div class='big'>£" +
        sum(month,"SubTotal").toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</div>" + month.length + " accepted";

      document.getElementById("lastMonthCard").innerHTML =
        "Last Month<br><div class='big'>£" +
        sum(lastMonth,"SubTotal").toLocaleString("en-GB",{minimumFractionDigits:2}) +
        "</div>" + lastMonth.length + " accepted";

      document.getElementById("todayCard").onclick = ()=>showDetail("Today Accepted", today);
      document.getElementById("monthCard").onclick = ()=>showDetail("This Month Accepted", month);
      document.getElementById("lastMonthCard").onclick = ()=>showDetail("Last Month Accepted", lastMonth);

      buildTop3(month);

    });
}

function buildTop3(data){

  const reps = {};

  data.forEach(r=>{
    const rep = r.SalesRep || "Unknown";
    reps[rep] = (reps[rep]||0) + (parseFloat(r.SubTotal)||0);
  });

  const sorted = Object.entries(reps)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3);

  let html = "<strong>Top 3 Sales Reps This Month</strong><br><br>";

  sorted.forEach(([rep,total],i)=>{
    html += (i+1) + ". " + rep +
      " - £" +
      total.toLocaleString("en-GB",{minimumFractionDigits:2}) +
      "<br>";
  });

  document.getElementById("topReps").innerHTML = html;
}

function showDetail(title, data){

  document.getElementById("mainView").classList.add("hidden");
  document.getElementById("detailView").classList.remove("hidden");

  document.getElementById("detailTitle").innerText = title;

  let html = "";

  data.forEach(r=>{

    html += `
      <div class="listItem" onclick="window.open('${r.SalesRepFacingUrl}','_blank')">
        <div class="docTitle">${r.DocNo} - ${r.SoldToCompany}</div>
        <div class="docValue">£${parseFloat(r.SubTotal).toLocaleString("en-GB",{minimumFractionDigits:2})}</div>
      </div>
    `;
  });

  document.getElementById("detailList").innerHTML = html;
}

function goBack(){
  document.getElementById("detailView").classList.add("hidden");
  document.getElementById("mainView").classList.remove("hidden");
}

loadData();
setInterval(loadData,60000);

</script>

</body>
</html>
