<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuoteValet Dashboard</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Roboto",sans-serif;
background:linear-gradient(140deg,#0f2027 0%,#203a43 50%,#2c5364 100%);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
}

.wrapper{
width:95%;
max-width:1300px;
padding:60px 20px;
}

h1{
text-align:center;
font-weight:400;
margin-bottom:40px;
}

.tab-container{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:40px;
}

.tab-btn{
padding:10px 26px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:0.2s ease;
font-weight:500;
}

.tab-btn:hover{
background:rgba(255,255,255,0.15);
}

.tab-btn.active{
background:white;
color:#203a43;
}

.stats-container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-bottom:40px;
}

.stat-card{
background:rgba(255,255,255,0.07);
backdrop-filter:blur(10px);
padding:30px 40px;
border-radius:18px;
min-width:220px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
margin-bottom:28px;
}

.info-panel{
background:rgba(255,255,255,0.07);
backdrop-filter:blur(10px);
border-radius:18px;
padding:24px 28px;
}

.info-panel h3{
margin:0 0 14px 0;
font-weight:500;
}

.panel-item{
padding:8px 0;
font-size:0.95rem;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.panel-item:last-child{
border-bottom:none;
}

.panel-sub{
display:block;
font-size:0.85rem;
opacity:0.75;
margin-top:2px;
}

.panel-item.clickable{
cursor:pointer;
}

.panel-item.clickable:hover{
opacity:1;
}

.hot-flag{
color:#ffb347;
font-weight:600;
}

.attention{
color:#ff5e5e;
font-weight:600;
}

.empty-note{
opacity:0.7;
font-size:0.9rem;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>🚀 QuoteValet Live Dashboard</h1>

<div class="tab-container">
<div class="tab-btn active" onclick="switchTab(event,'Accepted')">💰 Accepted</div>
<div class="tab-btn" onclick="switchTab(event,'Views')">👀 Views</div>
<div class="tab-btn" onclick="switchTab(event,'NotViewed')">📭 Not Viewed</div>
</div>

<div class="stats-container" id="statsContainer"></div>

<div class="info-grid">
<div id="panelLeft" class="info-panel"></div>
<div id="panelRight" class="info-panel"></div>
</div>

<div class="info-grid">
<div id="activityFeed" class="info-panel"></div>
<div id="attentionQuotes" class="info-panel"></div>
</div>

</div>

<script>

const APPS_SCRIPT_BASE="https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec";

let allData=[];
let quotes={};
let currentTab="Accepted";
let currentScript;

function currency(v){
return parseFloat(v||0).toLocaleString("en-GB",{style:"currency",currency:"GBP"});
}

function timeAgo(date){
const then=new Date(date);
const now=new Date();
const diff=Math.floor((now-then)/60000);
if(diff<1)return"just now";
if(diff<60)return diff+"m ago";
const hrs=Math.floor(diff/60);
if(hrs<24)return hrs+"h ago";
return Math.floor(hrs/24)+"d ago";
}

function loadData(){

if(currentScript) currentScript.remove();

const script=document.createElement("script");
script.src=APPS_SCRIPT_BASE+"?callback=handleData&ts="+Date.now();

currentScript=script;
document.body.appendChild(script);

}

function handleData(data){

allData=data||[];

groupQuotes();

renderDashboard();

}

function groupQuotes(){

quotes={};

allData.forEach(r=>{

const doc=r.DocNo||"UNKNOWN";

if(!quotes[doc]){

quotes[doc]={
doc:null,
views:0,
accepted:false,
created:false,
latestView:null
};

}

if(r.EventFullName==="QuoteValet.CreatedForCustomer"){
quotes[doc].created=true;
quotes[doc].doc=r;
}

if(r.EventFullName==="QuoteValet.ViewedExternal"){

quotes[doc].views++;

if(!quotes[doc].latestView || new Date(r.EventDateTime)>new Date(quotes[doc].latestView)){
quotes[doc].latestView=r.EventDateTime;
}

if(!quotes[doc].doc) quotes[doc].doc=r;

}

if(r.EventFullName==="QuoteValet.Accepted"){
quotes[doc].accepted=true;
if(!quotes[doc].doc) quotes[doc].doc=r;
}

});

}

function switchTab(e,tab){

currentTab=tab;

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

renderDashboard();

}

function renderDashboard(){

document.getElementById("statsContainer").innerHTML="";
document.getElementById("panelLeft").innerHTML="";
document.getElementById("panelRight").innerHTML="";
document.getElementById("activityFeed").innerHTML="";
document.getElementById("attentionQuotes").innerHTML="";

const now=new Date();
const todayUK=now.toLocaleDateString("en-GB");

const yesterday=new Date();
yesterday.setDate(yesterday.getDate()-1);
const yesterdayUK=yesterday.toLocaleDateString("en-GB");

const thisMonth=now.getMonth();
const thisYear=now.getFullYear();

let eventType="";
if(currentTab==="Accepted") eventType="QuoteValet.Accepted";
if(currentTab==="Views") eventType="QuoteValet.ViewedExternal";

const filtered=allData.filter(r=>r.EventFullName===eventType);

const todayData=filtered.filter(r=>new Date(r.EventDateTime).toLocaleDateString("en-GB")===todayUK);
const yesterdayData=filtered.filter(r=>new Date(r.EventDateTime).toLocaleDateString("en-GB")===yesterdayUK);
const thisMonthData=filtered.filter(r=>{
const d=new Date(r.EventDateTime);
return d.getMonth()===thisMonth && d.getFullYear()===thisYear;
});

createStatCard("📆 Today",todayData);
createStatCard("📅 Yesterday",yesterdayData);
createStatCard("📅 This Month",thisMonthData);

const list=Object.values(quotes);

if(currentTab==="Accepted"){

const avgDeal=thisMonthData.length>0
?thisMonthData.reduce((s,r)=>s+parseFloat(r.SubTotal||0),0)/thisMonthData.length
:0;

createSimpleCard("💷 Avg Deal",currency(avgDeal),"this month");

const accepted=list.filter(q=>q.accepted);
renderAccepted(accepted);

renderActivity("QuoteValet.Accepted","📡 Most Recent Acceptances");

}

if(currentTab==="Views"){

const unique=[...new Set(thisMonthData.map(r=>r.DocNo))].length;
createSimpleCard("🔎 Unique Quotes",unique,"viewed this month");

const viewed=list.filter(q=>q.views>0);
renderViewed(viewed);

renderActivity("QuoteValet.ViewedExternal","📡 Live Views");

}

if(currentTab==="NotViewed"){

const notViewed=list.filter(q=>q.created && q.views===0);
createSimpleCard("📭 Never Viewed",notViewed.length,"quotes");

renderNotViewed(notViewed);

}

renderAttentionQuotes();

}

function createStatCard(title,data){

const count=data.length;
const value=data.reduce((s,r)=>s+parseFloat(r.SubTotal||0),0);

const card=document.createElement("div");
card.className="stat-card";

card.innerHTML=`
<div class="stat-title">${title}</div>
<div class="stat-number">${count}</div>
<div class="stat-sub">${currentTab==="Accepted"?"accepted · "+currency(value):"events"}</div>
`;

document.getElementById("statsContainer").appendChild(card);

}

function createSimpleCard(title,value,sub){

const card=document.createElement("div");
card.className="stat-card";

card.innerHTML=`
<div class="stat-title">${title}</div>
<div class="stat-number">${value}</div>
<div class="stat-sub">${sub}</div>
`;

document.getElementById("statsContainer").appendChild(card);

}

function renderAccepted(data){

let html="<h3>💎 Largest Accepted Deals</h3>";

data.sort((a,b)=>parseFloat(b.doc.SubTotal)-parseFloat(a.doc.SubTotal))
.slice(0,8)
.forEach(q=>{

html+=`
<div class="panel-item clickable" onclick="openQuote('${q.doc.SalesRepFacingUrl}')">
<strong>${q.doc.DocNo}</strong>
<span class="panel-sub">${q.doc.DocName||""} · ${currency(q.doc.SubTotal)}</span>
</div>
`;

});

document.getElementById("panelLeft").innerHTML=html;

}

function renderViewed(data){

let html="<h3>👀 Most Viewed Quotes</h3>";

data.sort((a,b)=>b.views-a.views)
.slice(0,8)
.forEach(q=>{

html+=`
<div class="panel-item clickable" onclick="openQuote('${q.doc.SalesRepFacingUrl}')">
<strong>${q.doc.DocNo}</strong>
<span class="panel-sub">${q.doc.DocName||""} · ${q.views} views · ${timeAgo(q.latestView)}</span>
</div>
`;

});

document.getElementById("panelLeft").innerHTML=html;

}

function renderNotViewed(data){

let html="<h3>📭 Quotes Not Viewed Yet</h3>";

data.sort((a,b)=>parseFloat(b.doc.SubTotal)-parseFloat(a.doc.SubTotal))
.slice(0,8)
.forEach(q=>{

html+=`
<div class="panel-item clickable" onclick="openQuote('${q.doc.SalesRepFacingUrl}')">
<strong>${q.doc.DocNo}</strong>
<span class="panel-sub">${q.doc.DocName||""} · ${currency(q.doc.SubTotal)}</span>
</div>
`;

});

document.getElementById("panelLeft").innerHTML=html;

}

function renderAttentionQuotes(){

const attention=Object.values(quotes)
.filter(q=>q.views>=3 && !q.accepted && parseFloat(q.doc.SubTotal||0)>3000)
.sort((a,b)=>b.views-a.views)
.slice(0,8);

let html="<h3>🚨 Quotes Needing Attention</h3>";

if(attention.length===0){
html+="<div class='empty-note'>Nothing urgent right now.</div>";
}else{

attention.forEach(q=>{

html+=`
<div class="panel-item clickable" onclick="openQuote('${q.doc.SalesRepFacingUrl}')">
<strong>${q.doc.DocNo}</strong> <span class="attention">⚠</span>
<span class="panel-sub">${currency(q.doc.SubTotal)} · ${q.views} views · last ${timeAgo(q.latestView)}</span>
</div>
`;

});

}

document.getElementById("attentionQuotes").innerHTML=html;

}

function renderActivity(event,title){

const rows=allData
.filter(r=>r.EventFullName===event)
.sort((a,b)=>new Date(b.EventDateTime)-new Date(a.EventDateTime))
.slice(0,8);

let html=`<h3>${title}</h3>`;

rows.forEach(r=>{

const time=new Date(r.EventDateTime).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

html+=`
<div class="panel-item">
${time} - ${r.DocNo} - ${currency(r.SubTotal)}
</div>
`;

});

document.getElementById("activityFeed").innerHTML=html;

}

function openQuote(url){
if(url)window.open(url,"_blank");
}

setInterval(loadData,60000);
loadData();

</script>

</body>
</html>
