<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QW Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #071a1f;
  color: #00ffb4;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.tabs {
  text-align: center;
  margin-bottom: 20px;
}

.tab-btn {
  background: transparent;
  border: 1px solid #00ffb4;
  color: #00ffb4;
  padding: 8px 20px;
  margin: 0 5px;
  cursor: pointer;
}

.tab-btn.active {
  background: #00ffb4;
  color: #071a1f;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 40px;
}

.stat-card {
  background: #0d2b31;
  padding: 20px;
  width: 220px;
  text-align: center;
  border-radius: 6px;
  transition: all 0.25s ease;
}

.clickable {
  cursor: pointer;
  border: 1px solid rgba(0,255,180,0.2);
}

.clickable:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(0,255,180,0.4);
  border-color: rgba(0,255,180,0.6);
}

.stat-label {
  font-size: 14px;
  opacity: 0.7;
}

.stat-value {
  font-size: 26px;
  margin-top: 10px;
}

.stat-count {
  font-size: 14px;
  margin-top: 6px;
}

.stat-hint {
  font-size: 11px;
  margin-top: 8px;
  opacity: 0.5;
}

.stat-card:hover .stat-hint {
  opacity: 1;
}

.drill-view {
  display: none;
  padding: 20px;
}

.back-btn {
  margin-bottom: 20px;
  background: #00ffb4;
  color: #071a1f;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
}

.doc-row {
  background: #0d2b31;
  padding: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.doc-row:hover {
  background: #13414a;
}

.doc-time {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">QuoteValet Dashboard</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('accepted')">Accepted</button>
  <button class="tab-btn" onclick="switchTab('views')">Views</button>
</div>

<div id="mainView">

  <div class="stats" id="statsContainer"></div>

</div>

<div class="drill-view" id="drillView">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <div id="drillContent"></div>
</div>

<script>

let allData = [];
let currentTab = "accepted";

function switchTab(tab) {
  currentTab = tab;

  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  renderDashboard();
}

function loadData() {
  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src = "https://script.google.com/macros/s/AKfycbzzQtKk_VCtHwYjhmC1f32dNPMXDb5CWa2jE7Sg2rMwVHY_HUvmijH9SnMUQjSTTG3ubw/exec?callback=handleData";
  document.body.appendChild(script);
}

function handleData(data) {
  allData = data;
  renderDashboard();
}

function renderDashboard() {

  document.getElementById("mainView").style.display = "block";
  document.getElementById("drillView").style.display = "none";

  const container = document.getElementById("statsContainer");
  container.innerHTML = "";

  const filtered = allData.filter(r => {
    if (currentTab === "accepted") {
      return r.EventFullName === "QuoteValet.Accepted";
    } else {
      return r.EventFullName === "QuoteValet.ViewedExternal";
    }
  });

  const now = new Date();
  const today = filtered.filter(r => new Date(r.EventDateTime).toDateString() === now.toDateString());

  const thisMonth = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });

  const lastMonth = filtered.filter(r => {
    const d = new Date(r.EventDateTime);
    const last = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    return d.getMonth() === last.getMonth() && d.getFullYear() === last.getFullYear();
  });

  addCard(container, "Today", today);
  addCard(container, "This Month", thisMonth);
  addCard(container, "Last Month", lastMonth);
}

function addCard(container, label, dataset) {

  const total = dataset.reduce((sum, r) => sum + parseFloat(r.GrandTotal || 0), 0);

  const card = document.createElement("div");
  card.className = "stat-card clickable";
  card.innerHTML = `
    <div class="stat-label">${label}</div>
    <div class="stat-value">£${total.toFixed(2)}</div>
    <div class="stat-count">${dataset.length} ${currentTab}</div>
    <div class="stat-hint">Click to view →</div>
  `;

  card.onclick = () => showDrill(label, dataset);

  container.appendChild(card);
}

function showDrill(label, dataset) {

  document.getElementById("mainView").style.display = "none";
  document.getElementById("drillView").style.display = "block";

  const container = document.getElementById("drillContent");
  container.innerHTML = `<h3>${label} - ${currentTab}</h3>`;

  dataset.sort((a,b) => new Date(b.EventDateTime) - new Date(a.EventDateTime));

  dataset.forEach(r => {

    const d = new Date(r.EventDateTime);

    let timeDisplay;

    if (label === "Today") {
      timeDisplay = d.toLocaleTimeString();
    } else {
      timeDisplay = d.toLocaleString();
    }

    const row = document.createElement("div");
    row.className = "doc-row";
    row.innerHTML = `
      <div>
        ${r.DocNo} - ${r.SoldToCompany}
        <div class="doc-time">${timeDisplay}</div>
      </div>
      <div>£${parseFloat(r.GrandTotal || 0).toFixed(2)}</div>
    `;

    row.onclick = () => {
      if (r.SalesRepFacingUrl) {
        window.open(r.SalesRepFacingUrl, "_blank");
      }
    };

    container.appendChild(row);
  });
}

function goBack() {
  document.getElementById("mainView").style.display = "block";
  document.getElementById("drillView").style.display = "none";
}

window.onload = loadData;
setInterval(loadData, 60000);

</script>

</body>
</html>
